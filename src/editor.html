<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Editor</title>
  <link rel="stylesheet" href="./css/editor.css">
</head>
<body>

<div class="ed-shell">

  <!-- ── Header ── -->
  <div class="ed-header">
    <div class="ed-header-top">
      <span class="ed-title">Timeline Editor</span>
      <select class="ed-campaign-select" id="ed-campaign-select"></select>
    </div>
    <div class="ed-campaign" id="ed-campaign-label">No campaign selected</div>
  </div>

  <!-- ── Scrollable body ── -->
  <div class="ed-body" id="ed-body">

    <!-- Shown when no timeline exists yet -->
    <div id="ed-create-panel" style="display:none">
      <div class="ed-create-header">No timeline yet</div>
      <div class="ed-create-desc">
        Set up the basic config to get started. You can change these later.
      </div>
      <div class="field-group" style="margin-bottom:10px">
        <label class="field-label">Vault / World name</label>
        <input type="text" id="create-vault" placeholder="e.g. Endmyre">
      </div>
      <div class="field-row" style="margin-bottom:10px">
        <div class="field-group">
          <label class="field-label">Start year</label>
          <input type="number" id="create-start" placeholder="e.g. 1" value="1">
        </div>
        <div class="field-group">
          <label class="field-label">End year</label>
          <input type="number" id="create-end" placeholder="e.g. 1500" value="100">
        </div>
        <div class="field-group">
          <label class="field-label">Current year</label>
          <input type="number" id="create-current" placeholder="e.g. 1237" value="50">
        </div>
      </div>
      <button class="btn btn-gold" id="btn-create-timeline" style="width:100%">
        Create Timeline
      </button>
    </div>

    <!-- Config panel — shown when timeline exists, collapsible -->
    <div id="ed-config-panel" style="display:none">
      <div class="ed-section" id="ed-config-section">
        <div class="ed-section-head" id="ed-config-toggle">
          <span class="ed-section-chevron">▶</span>
          <span class="ed-section-name">Timeline Config</span>
          <span class="ed-section-count" id="ed-config-summary"></span>
        </div>
        <div class="ed-section-body" id="ed-config-body">
          <div style="padding:10px 12px;display:flex;flex-direction:column;gap:8px;">
            <div class="field-group">
              <label class="field-label">Vault / World name</label>
              <input type="text" id="cfg-vault" placeholder="e.g. Endmyre">
            </div>
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Start year</label>
                <input type="number" id="cfg-start">
              </div>
              <div class="field-group">
                <label class="field-label">End year</label>
                <input type="number" id="cfg-end">
              </div>
              <div class="field-group">
                <label class="field-label">Current year</label>
                <input type="number" id="cfg-current">
              </div>
            </div>
            <button class="btn btn-gold btn-sm" id="btn-save-config" style="align-self:flex-end">
              Save Config
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section list rendered here by editor.ts -->
    <div id="ed-sections"></div>

  </div>

</div>

<!-- ══════════════════════════════════════════════════════════
     ITEM EDIT MODAL
══════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-item">
  <div class="modal">
    <h3 id="modal-item-title">Edit Item</h3>

    <div class="field-group">
      <label class="field-label">Type</label>
      <select class="form-select" id="item-type">
        <option value="span">Span (duration)</option>
        <option value="point">Point (moment)</option>
      </select>
    </div>

    <div class="field-group">
      <label class="field-label">Label</label>
      <input type="text" id="item-label" placeholder="Event name">
    </div>

    <div class="field-group">
      <label class="field-label">Tint</label>
      <select class="form-select" id="item-tint"></select>
    </div>

    <!-- Span fields -->
    <div id="span-fields">
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Start year</label>
          <input type="number" id="item-start" placeholder="e.g. 1200">
        </div>
        <div class="field-group">
          <label class="field-label">End year</label>
          <input type="number" id="item-end" placeholder="e.g. 1210">
        </div>
      </div>
    </div>

    <!-- Point fields -->
    <div id="point-fields" style="display:none">
      <div class="field-group">
        <label class="field-label">Year</label>
        <input type="number" id="item-year" placeholder="e.g. 1205">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Obsidian path (optional)</label>
      <input type="text" id="item-obs" placeholder="Events/MyEvent">
    </div>

    <div class="modal-foot">
      <button class="btn" id="modal-item-cancel">Cancel</button>
      <button class="btn btn-gold" id="modal-item-save">Save</button>
    </div>
  </div>
</div>

<!-- Section rename modal -->
<div class="modal-overlay" id="modal-section">
  <div class="modal">
    <h3>Rename Section</h3>
    <div class="field-group">
      <label class="field-label">Section label</label>
      <input type="text" id="section-label-input" placeholder="e.g. Events">
    </div>
    <div class="modal-foot">
      <button class="btn" id="modal-section-cancel">Cancel</button>
      <button class="btn btn-gold" id="modal-section-save">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="./modules/editor.ts"></script>
</body>
</html>
