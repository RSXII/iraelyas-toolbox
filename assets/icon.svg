<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#09090b"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#c9a84c" stroke-width="8" opacity="0.4"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.2"/>

  <!-- Central octagon (d20 inspired) -->
  <polygon
    points="256,80 340,116 396,196 396,316 340,396 256,432 172,396 116,316 116,196 172,116"
    fill="#18181c" stroke="#c9a84c" stroke-width="5"/>

  <!-- Inner detail lines -->
  <polygon
    points="256,108 328,138 376,208 376,304 328,374 256,404 184,374 136,304 136,208 184,138"
    fill="none" stroke="#7a6230" stroke-width="1.5" opacity="0.6"/>

  <!-- Sword vertical -->
  <rect x="248" y="140" width="16" height="200" rx="3" fill="#c9a84c" opacity="0.9"/>
  <!-- Crossguard -->
  <rect x="210" y="220" width="92" height="12" rx="3" fill="#c9a84c" opacity="0.9"/>
  <!-- Pommel -->
  <circle cx="256" cy="355" r="14" fill="#c9a84c" opacity="0.9"/>
  <!-- Blade tip -->
  <polygon points="248,140 264,140 256,115" fill="#c9a84c" opacity="0.9"/>

  <!-- Corner ornaments -->
  <g opacity="0.35" stroke="#c9a84c" stroke-width="2" fill="none">
    <path d="M80 80 L80 110 L110 80"/>
    <path d="M432 80 L402 80 L432 110"/>
    <path d="M80 432 L110 432 L80 402"/>
    <path d="M432 432 L432 402 L402 432"/>
  </g>
</svg>
