<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer Trigger</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root">
      <!-- ── Loading ── -->
      <div id="state-loading" class="state">
        <p class="dim">Connecting…</p>
      </div>

      <!-- ── Setup ── -->
      <div id="state-setup" class="state hidden">
        <div class="card">
          <h2 class="card-title">Set Timer Trigger</h2>
          <p class="dim">
            When the target time arrives the selected tracker entry will be
            adjusted automatically — even if the app was closed.
          </p>

          <div class="field">
            <label for="entry-select">Tracker Entry</label>
            <select id="entry-select">
              <option value="">— select an entry —</option>
            </select>
            <p id="no-entries-msg" class="dim warn hidden">
              No tracker entries yet. Create one in the Tracker tab first, then
              come back.
            </p>
          </div>

          <div class="field">
            <label for="datetime-input">Target Date &amp; Time</label>
            <input type="datetime-local" id="datetime-input" />
          </div>

          <div class="field field-row">
            <label for="delta-input">Adjust value by</label>
            <input type="number" id="delta-input" value="1" step="1" />
            <span class="dim">(use negative to count down)</span>
          </div>

          <p id="setup-error" class="error-text hidden"></p>

          <button id="save-btn" class="btn btn-gold">Arm Timer</button>
        </div>
      </div>

      <!-- ── Armed ── -->
      <div id="state-armed" class="state hidden">
        <div class="card">
          <span class="badge badge-armed">⏰ ARMED</span>
          <h2 class="card-title" id="armed-entry-name"></h2>
          <p class="dim" id="armed-target-label"></p>
          <div class="countdown" id="countdown-display">—</div>
          <p class="dim" id="armed-delta-label"></p>
          <button id="reset-btn" class="btn btn-danger">Cancel Timer</button>
        </div>
      </div>

      <!-- ── Fired ── -->
      <div id="state-fired" class="state hidden">
        <div class="card">
          <span class="badge badge-fired">✓ TRIGGERED</span>
          <h2 class="card-title" id="fired-entry-name"></h2>
          <p class="dim" id="fired-summary"></p>
          <button id="new-timer-btn" class="btn btn-gold">Set New Timer</button>
        </div>
      </div>

      <!-- ── Error (entry deleted or action failed) ── -->
      <div id="state-error" class="state hidden">
        <div class="card">
          <span class="badge badge-error">⚠ ERROR</span>
          <p class="error-text" id="error-message"></p>
          <button id="error-reset-btn" class="btn btn-danger">Reset</button>
        </div>
      </div>
    </div>

    <script src="plugin-sdk.js"></script>
    <script src="app.js"></script>
  </body>
</html>
