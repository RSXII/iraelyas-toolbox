appId: com.rsxii.iraelyas-toolbox
productName: "Iraelya's 5e Toolbox"
copyright: "Copyright © 2024 RSXII"

directories:
  output: dist/installers
  buildResources: assets

files:
  - dist/renderer/**/*
  - electron/**/*
  - package.json

# The renderer loads from the built dist folder in production
extraMetadata:
  main: electron/main.js

mac:
  category: public.app-category.entertainment
  icon: assets/icon.png
  target:
    - target: dmg
      arch: [x64, arm64]
  darkModeSupport: true

dmg:
  title: "Iraelya's 5e Toolbox"
  window:
    width: 540
    height: 380

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Iraelya's 5e Toolbox"

linux:
  icon: assets/icon.png
  target: AppImage
  category: Game
